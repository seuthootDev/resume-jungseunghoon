career-profile:
    title: Profile
    summary: |
      안녕하세요. 저는 정승훈입니다, 스타트업에서 소프트웨어 개발을 주도하며 다양한 경험을 쌓아온 개발자입니다.
      백엔드부터 프론트엔드, 그리고 데이터 분석 및 클라우드 인프라까지 폭넓은 기술 스택을 보유하고 있으며,
      문제 해결과 효율적인 시스템 구축에 열정을 가지고 있습니다.
      새로운 도전과 기술 혁신을 추구하며, 팀과 협업하여 창의적인 솔루션을 제시할 수 있도록 노력하고 있습니다.
      빠르게 변화하는 환경 속에서도 유연하게 대처하며, 높은 품질의 소프트웨어를 개발하는 것을 목표로 하고 있습니다.

