career-profile:
    title: Profile
    summary: |
      저는 수학을 전공하며 쌓아온 논리적 사고를 바탕으로 소프트웨어 개발에 임하고 있습니다.
      특히, 현 직장에서 VTK(Visualization Toolkit)를 활용해 3D 시각화 작업을 수행할 때, 선형대수에서 배운
      변환 행렬과 같은 기하학적인 지식이 큰 도움이 되었습니다.
        
      이전 직장에서 ERP 시스템을 직접적으로 사용하면서, 실제로 현장에서 필요한 소프트웨어가 어떤 방식으로 만들어지고
      어떻게 운영되어야 하는지에 대해 체험할 수 있었습니다.
      이 경험은 개발자로서 실용적이고 사용자 중심의 소프트웨어를 만들 수 있는 역량을 키워주었다고 생각합니다.
        
      개발자로 직무를 변경한 지 1년 만에 4개의 자격증을 취득하면서 끊임없이 배우고 성장하는 자세를 유지하고 있습니다.
      저의 학문적 배경과 실무 경험, 그리고 지속적인 학습 의지를 바탕으로 더 나은 소프트웨어 개발자가 되기 위해 노력하고 있습니다.
